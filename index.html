<!DOCTYPE html>
<html>
<head>
<title>Employee Management System</title>
<style>
body{
    font-family: Arial;
    text-align: center;
    background-color:#f2f2f2;
}
h1{
    color:#2c3e50;
}
</style>
</head>
<body>

<h1>Employee Management System</h1>
<p>Welcome to Employee Management System</p>
</body>
<h2>Employee List</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
</tr>

{% for emp in employees %}
<tr>
<td>{{ emp[0] }}</td>
<td>{{ emp[1] }}</td>
<td>{{ emp[2] }}</td>
</tr>
{% endfor %}

</table>
</html>
