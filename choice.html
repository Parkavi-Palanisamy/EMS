<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }
        h2 { color: #333; margin-bottom: 30px; }
        
        .btn-box {
            display: grid;
            gap: 15px;
        }

        .dash-button {
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.3s;
        }

        .admin-btn { background-color: #e74c3c; } /* Red for Admin */
        .employee-btn { background-color: #2ecc71; } /* Green for Employee */

        .dash-button:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Welcome, {{ session['user'] }}</h2>
    <p>Please select your destination:</p>
    
    <div class="btn-box">
        <a href="/admin_dashboard" 
           class="dash-button admin-btn {% if role != 'admin' %}disabled{% endif %}">
           Admin Dashboard {% if role != 'admin' %}(Locked){% endif %}
        </a>

        <a href="/employee_dashboard" class="dash-button employee-btn">
            Employee Dashboard
        </a>
    </div>

    <br>
    <form action="/logout" method="POST">
        <button type="submit" style="background:none; border:none; color:#666; cursor:pointer; text-decoration:underline;">Logout</button>
    </form>
</div>

</body>
</html>
